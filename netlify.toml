# Netlify configuration for BetaPower static site

[build]
  command = "npm run build"
  publish = "out"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Security headers are defined in public/_headers file
# and will be automatically applied by Netlify

[build.environment]
  NODE_VERSION = "20"

# Canonical domain: https://betapower.fr (non-www, HTTPS)
[[redirects]]
  from = "https://www.betapower.fr/*"
  to = "https://betapower.fr/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.betapower.fr/*"
  to = "https://betapower.fr/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://betapower.fr/*"
  to = "https://betapower.fr/:splat"
  status = 301
  force = true

# Redirections permanentes — anciennes pages d'offres vers les nouvelles (8→5)
[[redirects]]
  from = "/offres/etudes-reseau/"
  to = "/offres/etudes-analyses-reseau/"
  status = 301

[[redirects]]
  from = "/offres/conseil-operationnel/"
  to = "/offres/exploitation-procedures-audit/"
  status = 301

[[redirects]]
  from = "/offres/audit-exploitation/"
  to = "/offres/exploitation-procedures-audit/"
  status = 301

[[redirects]]
  from = "/offres/formation-operateurs/"
  to = "/offres/formation-simulateurs/"
  status = 301

[[redirects]]
  from = "/offres/ots-ingenierie-scenarios/"
  to = "/offres/formation-simulateurs/"
  status = 301

[[redirects]]
  from = "/offres/donnees-cgmes-automatisation/"
  to = "/offres/etudes-analyses-reseau/"
  status = 301

[[redirects]]
  from = "/offres/due-diligence/"
